kind = "web"
previewPath = "/"
title = "Zaix Anime"
version = "1.0.0"
id = "artifacts/zaix-anime"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20145

[services.development]
run = "pnpm --filter @workspace/zaix-anime run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zaix-anime", "run", "build" ]
publicDir = "artifacts/zaix-anime/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20145"
BASE_PATH = "/"
